name: Build luci-app-PushX

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（留空不发布 Release）'
        required: false
        default: ''
      release_notes:
        description: '发布说明'
        required: false
        default: ''
  push:
    branches:
      - main
      - master

env:
  SDK_URL: https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
  PackageName: luci-app-PushX
  PackageSource_URL: https://github.com/T-Zphxlf/luci-app-pushbotx
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL git.io/depends-ubuntu-2004)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        wget $SDK_URL
        mkdir /workdir/openwrt
        tar xf openwrt-sdk-* -C /workdir/openwrt --strip-components 1
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd openwrt
        cp -r $GITHUB_WORKSPACE package/$PackageName
        make defconfig
        echo "CONFIG_PACKAGE_$PackageName=y" >> ./.config

    - name: Fix execute permissions
      run: |
        chmod +x openwrt/package/$PackageName/root/usr/bin/pushx/pushx
        chmod +x openwrt/package/$PackageName/root/etc/init.d/pushx
        chmod +x openwrt/package/$PackageName/root/etc/uci-defaults/luci-pushx

    - name: Compile the package
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make package/$PackageName/compile V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/packages/*/base
        mkdir -p /tmp/artifacts
        cp luci-app-pushx*.ipk /tmp/artifacts/ 2>/dev/null || true
        cp luci-app-PushX*.ipk /tmp/artifacts/ 2>/dev/null || true
        ls /tmp/artifacts/*.ipk
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload package to artifact
      if: steps.organize.outputs.status == 'success' && !cancelled()
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.PackageName }}
        path: /tmp/artifacts/

    - name: Create Release
      if: steps.organize.outputs.status == 'success' && github.event.inputs.version != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: ${{ github.event.inputs.version }}
        body: ${{ github.event.inputs.release_notes }}
        files: /tmp/artifacts/*.ipk